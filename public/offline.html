<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextCBT - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { text-align: center; max-width: 360px; }
    .icon { width: 80px; height: 80px; margin: 0 auto 24px; background: #eff6ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .icon svg { width: 40px; height: 40px; color: #2563eb; }
    h1 { font-size: 20px; color: #1e293b; margin-bottom: 8px; }
    p { font-size: 14px; color: #64748b; line-height: 1.5; margin-bottom: 24px; }
    .safe { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; padding: 12px 16px; margin-bottom: 24px; }
    .safe p { color: #166534; margin: 0; font-size: 13px; }
    button { background: #2563eb; color: white; border: none; padding: 14px 32px; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
    button:active { transform: scale(0.98); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" />
      </svg>
    </div>
    <h1>Tidak Ada Koneksi</h1>
    <p>Perangkat Anda sedang offline. Jika sedang mengerjakan ujian, jawaban tetap tersimpan di perangkat.</p>
    <div class="safe">
      <p>✅ Jawaban Anda aman tersimpan di perangkat ini</p>
    </div>
    <button onclick="window.location.reload()">Coba Lagi</button>
  </div>
</body>
</html>
